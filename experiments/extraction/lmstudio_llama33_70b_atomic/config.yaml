task: extraction
variable: atomic
model: llama-3.3-70b
contributor: tom
description: >
  Atomic field extraction from raw CV text using Llama 3.3 70B (LM Studio).
  Extracts birth_year, birth_place, birth_country, sex, edu_start,
  edu_end, edu_degree in a single structured JSON prompt per CV.
notes: >
  Single JSON extraction call per CV. LM Studio local API. Coded fields
  (sex, birth_country, edu_degree) use codebook format loaded from gold.
