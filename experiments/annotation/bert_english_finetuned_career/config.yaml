task: annotation
variable: career_position
model: bert-base-cased
contributor: tom
description: Fine-tuned English BERT (base, cased) for career_position annotation — fine-grained labels
notes: >
  Text input: job_description_label (128 tokens).
  5 epochs, lr=2e-5, batch_size=32, weight_decay=0.01.
  English-only model used as a baseline to assess whether multilingual capability
  matters — job_description_label is predominantly English but has non-English
  entries where cv_local was the only available source.
